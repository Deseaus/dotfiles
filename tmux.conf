# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Status bar on top
set-option -g status-position top

set-option -g repeat-time 0

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Removes ESC delay
set -sg escape-time 0

# Big scrollback limit
set -g history-limit 10000

# Vi shell mode
set -g @shell_mode 'vi'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'caiogondim/maglev'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# maglev's theme script only detects installed plugins via the legacy
# @tpm_plugins variable (TPM itself deprecated it in favor of the @plugin
# lines above). Without it, maglev.tmux exits 1 before applying the theme.
set -g @tpm_plugins 'tmux-plugins/tpm caiogondim/maglev tmux-plugins/tmux-resurrect tmux-plugins/tmux-continuum tmux-plugins/tmux-open tmux-plugins/tmux-pain-control tmux-plugins/tmux-copycat tmux-plugins/tmux-yank tmux-plugins/tmux-battery tmux-plugins/tmux-cpu'

# Auto-restore session
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Use mouse
set-option -g mouse on

# Set C-f as prefix
unbind-key C-b
set -g prefix 'C-f'
bind-key 'C-f' send-prefix

# Reload tmux config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"

# Open windows and panes in the same path as where they were opened from
# https://evertpot.com/osx-tmux-vim-copy-paste-clipboard/
bind j split-window -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pass through claude commands
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Theme

# maglev.tmux tries to set the battery icon to a heart via @batt_charged_icon
# etc, but the installed tmux-battery reads different option names
# (@batt_icon_status_* for charging/attached/unknown, @batt_icon_charge_tier1-8
# for the discharging gauge) - so maglev's icon config is dead and the default
# block-tier icons show instead. Set the names the plugin actually reads.
set -g @batt_icon_status_charged "♥"
set -g @batt_icon_status_charging "♥"
set -g @batt_icon_status_attached "♥"
set -g @batt_icon_status_unknown "♥"
set -g @batt_icon_charge_tier8 "♥"
set -g @batt_icon_charge_tier7 "♥"
set -g @batt_icon_charge_tier6 "♥"
set -g @batt_icon_charge_tier5 "♥"
set -g @batt_icon_charge_tier4 "♥"
set -g @batt_icon_charge_tier3 "♥"
set -g @batt_icon_charge_tier2 "♥"
set -g @batt_icon_charge_tier1 "♥"

run '~/.tmux/plugins/maglev/maglev.tmux'
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.tmux/plugins/tmux-battery/battery.tmux'
run-shell '~/.tmux/plugins/tmux-continuum/continuum.tmux'

# maglev leaves a low-contrast, unreadable clock/date segment - see
# tmux/scripts/fix-status-right.sh. Must run after the theme so it patches
# the final built status-right.
run-shell '~/.tmux/scripts/fix-status-right.sh'
